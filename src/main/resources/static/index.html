<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Todo List</h1>
    <h2>Make your work done by writing down all the tasks you need to pay attention to! :) </h2>
    <form id="todoForm">
        <input
                type="text"
                id="taskInput"
                placeholder="Enter your task"
                required
        >

        <button type="submit">Add Task</button>
    </form>

    <hr>

    <ul id="taskList">
    </ul>

</div>

<script src="script.js"></script>

</body>
</html>
